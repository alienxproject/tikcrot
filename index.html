<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTod</title>
<link rel="icon" href="https://static.vecteezy.com/system/resources/thumbnails/045/832/436/small_2x/3d-pink-alphabet-letter-t-png.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="logoHome"><img src="https://i.ibb.co.com/5XCdSQrN/Tik-Tod-1.png" alt="TikTod"></div>

<!-- Hamburger button -->
<div id="drawerBtn">
  <span></span><span></span><span></span>
</div>

<!-- Overlay backdrop -->
<div id="drawerOverlay"></div>

<!-- Drawer panel -->
<div id="drawer">
  <!-- Header -->
  <div class="dr-header">
    <img src="https://i.ibb.co.com/5XCdSQrN/Tik-Tod-1.png" alt="TikTod">
    <div>
      <div class="dr-header-title">TikTod</div>
      <div class="dr-header-sub">Discover videos</div>
    </div>
  </div>

  <!-- Body: semua menu langsung tampil tanpa dropdown -->
  <div class="dr-body">

    <!-- Home — label saja, klik footer Home untuk navigasi -->
    <div class="dr-section">🏠 Home</div>

    <div class="dr-divider"></div>

    <!-- Folder — isi link, ganti href sesuai URL tujuan -->
    <div class="dr-section">📁 Folder</div>
    <a class="dr-link" href="https://example.com/folder/1" target="_blank" rel="noopener">Folder 1</a>
    <a class="dr-link" href="https://example.com/folder/2" target="_blank" rel="noopener">Folder 2</a>
    <a class="dr-link" href="https://example.com/folder/3" target="_blank" rel="noopener">Folder 3</a>
    <a class="dr-link" href="https://example.com/folder/4" target="_blank" rel="noopener">Folder 4</a>
    <a class="dr-link" href="https://example.com/folder/5" target="_blank" rel="noopener">Folder 5</a>

    <div class="dr-divider"></div>

    <!-- Trending -->
    <div class="dr-section">🔥 Trending</div>
    <a class="dr-link" href="https://example.com/trending/1" target="_blank" rel="noopener">Trending 1</a>
    <a class="dr-link" href="https://example.com/trending/2" target="_blank" rel="noopener">Trending 2</a>
    <a class="dr-link" href="https://example.com/trending/3" target="_blank" rel="noopener">Trending 3</a>
    <a class="dr-link" href="https://example.com/trending/4" target="_blank" rel="noopener">Trending 4</a>
    <a class="dr-link" href="https://example.com/trending/5" target="_blank" rel="noopener">Trending 5</a>

    <div class="dr-divider"></div>

    <!-- Genre -->
    <div class="dr-section">⭐ Genre</div>
    <a class="dr-link" href="https://example.com/genre/1" target="_blank" rel="noopener">Genre 1</a>
    <a class="dr-link" href="https://example.com/genre/2" target="_blank" rel="noopener">Genre 2</a>
    <a class="dr-link" href="https://example.com/genre/3" target="_blank" rel="noopener">Genre 3</a>
    <a class="dr-link" href="https://example.com/genre/4" target="_blank" rel="noopener">Genre 4</a>
    <a class="dr-link" href="https://example.com/genre/5" target="_blank" rel="noopener">Genre 5</a>

  </div><!-- end dr-body -->

  <!-- Footer -->
  <div class="dr-footer">
    <div class="dr-footer-item" id="drSavedBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
      Saved
    </div>
    <div class="dr-footer-item" id="drHomeBtnFooter">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </div>
  </div>
</div>
<div id="swipeHint">☝️ swipe up untuk next</div>
<div id="dots"></div>
<div id="feed" style="bottom:60px"></div>
<div id="toast"></div>

<div class="page" id="pageExplore">
  <div class="page-header"><h2>Explore</h2></div>
  <div class="video-grid" id="gridExplore"></div>
</div>
<div class="page" id="pageSearch">
  <div class="page-header">
    <h2>Search</h2>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:#fff;flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Cari video...">
    </div>
  </div>
  <div class="video-grid" id="gridSearch"></div>
</div>
<div class="page" id="pageLikes">
  <div class="page-header"><h2>Saved</h2></div>
  <div class="video-grid" id="gridLikes"></div>
</div>

<nav id="navbar">
  <div class="nav-item active" data-page="home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </div>
  <div class="nav-item" data-page="explore">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    <span>Explore</span>
  </div>
  <div class="nav-item" data-page="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>Search</span>
  </div>
  <div class="nav-item" data-page="likes">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
    <span>Saved</span>
  </div>
</nav>

<script src="data/videos.js"></script>
<script src="js/app.js"></script>
</body>
</html>
